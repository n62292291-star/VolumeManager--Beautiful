on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
  pull_request:
    branches:
      - main
    paths-ignore:
      - README.md
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Make gradlew executable
        run: chmod +x gradlew
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Build
        run: ./gradlew assembleRelease

      

      - run: cp app/build/outputs/apk/release/app-release-unsigned.apk volume-manager.apk

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          path: volume-manager.apk
          name: volume-manager
